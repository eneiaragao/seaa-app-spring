<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEAA - CEF 02 ARAPOANGA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <header class="minha-div-estilizada">
        <a href="#" class="link-da-div">
            <h1 id="meu-titulo">SEAA/CEF 02 ARAPOANGA</h1>
        </a>
    </header>

    <section class="barra-de-pesquisa">
        <h2>Opções de Pesquisa</h2>
        <div class="botoes-row">
            <button class="btn-pesquisa" id="btn-turma">Pesquisar por Turma</button>
            <button class="btn-pesquisa" id="btn-nome">Pesquisar por Nome</button>
            <button class="btn-pesquisa" id="btn-processo">Pesquisar por Processo</button>
            <button class="btn-pesquisa btn-amarelo" id="btn-avancada">Pesquisa Avançada (Tudo)</button>
            <button class="btn-pesquisa btn-verde" id="btn-inserir">+ Inserir Novo Aluno</button>
            <button class="btn-pesquisa btn-ciano" id="btn-inserir-devolutiva">+ Inserir Devolutiva</button>
        </div>

        <div id="campo-pesquisa-turma" class="campo-pesquisa-oculto">
            <input type="text" id="input-turma" placeholder="Ex: 8º C" class="input-pesquisa">
        </div>
        <div id="campo-pesquisa-nome" class="campo-pesquisa-oculto">
            <input type="text" id="input-nome-aluno" placeholder="Nome do aluno..." class="input-pesquisa">
        </div>
        <div id="campo-pesquisa-processo" class="campo-pesquisa-oculto">
            <input type="text" id="input-processo" placeholder="00080..." class="input-pesquisa">
        </div>
    </section>

    <section class="area-exclusao-centralizada">
        <input type="number" id="input-id-excluir" placeholder="ID do Aluno" class="input-pesquisa-excluir">
        <button id="btn-excluir-aluno" class="btn-vermelho">🗑️ Excluir por ID</button>
    </section>

    <section id="area-insercao" class="secao-cadastro" style="display:none;">
        <h3>Cadastro de Novo Aluno</h3>
        <form id="form-insercao">
            <input type="text" id="input-nome" placeholder="Nome Completo" required class="input-form">
            <input type="text" id="input-turma-insercao" placeholder="Turma (Ex: 8º C)" required class="input-form">
            <input type="text" id="input-processo-insercao" placeholder="Processo SEI" class="input-form">
            <input type="date" id="input-data-envio" class="input-form">
            <input type="text" id="input-contato" placeholder="Contato/Telefone" class="input-form">
            <button type="submit" class="btn-pesquisa btn-verde">Salvar Aluno</button>
        </form>
    </section>

    <section id="area-insercao-devolutiva" class="secao-cadastro" style="display:none;">
        <h3>Registrar Devolutiva</h3>
        <form id="form-insercao-devolutiva">
            <input type="number" id="input-aluno-id" placeholder="ID do Aluno" required class="input-form">
            <input type="date" id="input-data-devolutiva" required class="input-form">
            <textarea id="input-comentario" placeholder="Comentário da Devolutiva" class="input-form"></textarea>
            <input type="text" id="input-encaminhamento" placeholder="Encaminhamento Especialista" class="input-form">
            <button type="submit" class="btn-pesquisa btn-ciano">Salvar Devolutiva</button>
        </form>
    </section>

    <div class="container-pdf">
        <button id="btn-gerar-pdf" class="btn-pdf-padrao">📄 Gerar Relatório PDF</button>
    </div>

    <main id="area-resultados"></main>

    <footer class="rodape">
        <div class="rodape-coluna">
            <img src="logo_cef-02.jpeg" alt="Logo" class="logo-rodape">
            <h3>Redes Sociais</h3>
            <p><a href="#">Instagram</a></p>
        </div>
        <div class="rodape-coluna">
            <h3>Contato</h3>
            <p>Telefone: (61) 3901-7613</p>
            <p>Email: cef02arapoanga@gmail.com</p>
        </div>
        <div class="rodape-coluna">
            <h3>Localização</h3>
            <p>Planaltina/DF - Arapoanga</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
