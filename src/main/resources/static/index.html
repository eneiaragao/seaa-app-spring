<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEAA-PEDAGOGO - CEF 02 ARAPOANGA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="logo_cef-02.jpeg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    

    <header class="minha-div-estilizada">
        <div class="menu-lateral">
    <ul>
        <li>
            <a href="index.html">🏠 Início</a>
        </li>
        <li>
            <a href="conselho.html">📋 Conselho de Classe</a>
        </li>
    </ul>
</div>
        <a href="#" class="link-da-div">
             <img src="logo_cef-02.jpeg" alt="Logo" class="logo-rodape">
            <h1 id="meu-titulo">SEAA-PEDAGOGO / CEF 02 ARAPOANGA</h1>
        </a>
    </header>

    <section class="barra-de-pesquisa">
        
        <div class="botoes-row">
            
        <button id="btn-gerar-pdf" class="btn-pdf-padrao">📄GerarPDF</button>
    
            <button class="btn-pesquisa" id="btn-alterar-turma">Alterar Turma</button>
            <button class="btn-pesquisa" id="btn-turma">Pesquisa Turma</button>
            <button class="btn-pesquisa" id="btn-nome">Pesquisa Nome</button>
            <button class="btn-pesquisa" id="btn-processo">Pesquisar Processo</button>
            <button class="btn-pesquisa btn-amarelo" id="btn-avancada">Pesquisa Avançada</button>
            <button class="btn-pesquisa btn-verde" id="btn-inserir">+ Inserir Aluno</button>
            <button class="btn-pesquisa btn-ciano" id="btn-inserir-devolutiva">Inserir Devolutiva</button>
        </div>
        
        <div id="campo-pesquisa-turma" class="campo-pesquisa-oculto">
            <input type="text" id="input-turma" placeholder="Ex: 8º C" class="input-pesquisa">
        </div>
        <div id="campo-pesquisa-nome" class="campo-pesquisa-oculto">
            <input type="text" id="input-nome-aluno" placeholder="Nome do aluno..." class="input-pesquisa">
        </div>
        <div id="campo-pesquisa-processo" class="campo-pesquisa-oculto">
            <input type="text" id="input-processo" placeholder="00080..." class="input-pesquisa">
        </div>
    </section>

    <section class="area-exclusao-centralizada">
        <input type="number" id="input-id-excluir" placeholder="ID do Aluno" class="input-pesquisa-excluir">
        <button id="btn-excluir-aluno" class="btn-vermelho">🗑️ Excluir por ID</button>
    </section>

    <section id="area-insercao" class="secao-cadastro tela" style="display:none;">
        <h3>Cadastro de Novo Aluno</h3>
        <form id="form-insercao">
            <input type="text" id="input-nome" placeholder="Nome Completo" required class="input-form">
            <input type="text" id="input-turma-insercao" placeholder="Turma (Ex: 8º C)" required class="input-form">
            <input type="text" id="input-processo-insercao" placeholder="Processo SEI" class="input-form">
            <input type="date" id="input-data-envio" class="input-form">
            <input type="text" id="input-contato" placeholder="Contato/Telefone" class="input-form">
            <button type="submit" class="btn-pesquisa btn-verde">Salvar Aluno</button>
        </form>
    </section>

    <section id="area-insercao-devolutiva" class="secao-cadastro tela" style="display:none;">
        <h3>Registrar Devolutiva</h3>
        <form id="form-insercao-devolutiva">
            <input type="number" id="input-aluno-id" placeholder="ID do Aluno" required class="input-form">
            <input type="date" id="input-data-devolutiva" required class="input-form">
            <textarea id="input-comentario" placeholder="Comentário da Devolutiva" class="input-form"></textarea>
            <input type="text" id="input-encaminhamento" placeholder="Encaminhamento Especialista" class="input-form">
            <button type="submit" class="btn-pesquisa btn-ciano">Salvar Devolutiva</button>
        </form>
    </section>

   <!-- Seção de Alterar Turma -->
   <section id="area-alterar-turma" class="secao-cadastro tela" style="display:none;">
           <h3>Alterar Turma ou Situação</h3>
           <form id="form-alterar-turma">
           <div class="grupo-input">
            <label for="input-turma-aluno-id">ID do Aluno:</label>
            <input type="number" id="input-turma-aluno-id" placeholder="Ex: 123" required class="input-form">
            </div>
        
        <div class="grupo-input">
            <label for="input-turma-nova">Nova Turma / Destino:</label>
            <input type="text" id="input-turma-nova" placeholder="Ex: 9º C ou TRANSFERIDO" required class="input-form">
        </div>

        <div class="grupo-input">
            <label for="input-turma-obs">Observação:</label>
            <textarea id="input-turma-obs" placeholder="Motivo da alteração..." class="input-form" rows="3"></textarea>
        </div>

        <button type="submit" class="btn-form-salvar btn-roxo">Confirmar Alteração</button>
    </form>
</section>

    

    <main id="area-resultados"></main>

    <footer class="rodape">
    <!-- Logo na margem esquerda -->

    </div>
</footer>

</body>
</html>
