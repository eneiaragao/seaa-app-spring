spring.application.name=SEAA-APP

# --- CONFIGURAÇÃO POSTGRESQL (RENDER) ---
# Substituímos o H2 pelo PostgreSQL persistente
spring.datasource.url=jdbc:postgresql://seaa-db-prod-db:5432/seaa_db_prod
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=seaa_db_prod_user

# IMPORTANTE: Copie a senha completa do campo "Internal Database URL" no Render
spring.datasource.password=764REcUuoFYKDO4pQv5FAwhs9TzvZqHl

# Dialeto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- CONFIGURAÇÕES JPA/HIBERNATE ---
# Mantemos o 'update' para criar as tabelas no novo banco automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- OTIMIZAÇÃO PARA O PLANO FREE DO RENDER ---
# Evita que a conexão caia por inatividade
spring.datasource.hikari.keepaliveTime=30000
spring.datasource.hikari.maximumPoolSize=5