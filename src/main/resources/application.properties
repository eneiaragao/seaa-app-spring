spring.datasource.username=seaa_db_prod_user
spring.datasource.password=764REcUuoFYKDO4pQv5FAwhs9TzvZqHl
spring.datasource.driverClassName=org.postgresql.Driver

# Dialeto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- CONFIGURAÇÕES JPA/HIBERNATE ---
# 'update' cria as tabelas automaticamente no primeiro acesso bem-sucedido
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- OTIMIZAÇÃO PARA O PLANO FREE DO RENDER ---
